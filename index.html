<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A2B4A">
<title>Mon Programme de Vie 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1A2B4A;--dark:#1F3D6B;--blue:#2D5FA6;--pale:#F0F6FF;
  --phys:#1A6FA8;--pbg:#E3F2F9;--plt:#F0F8FD;
  --card:#1D8A6A;--cbg:#E3F7F1;--clt:#F0FBF7;
  --spir:#7A5C00;--sbg:#FFF8E1;--slt:#FFFCE8;
  --ment:#6B2D8B;--mbg:#F3EDF7;--mlt:#F8F4FB;
  --emot:#1B6B4A;--ebg:#E3F5EC;--elt:#F0FAF4;
  --aut:#8B3A00;--abg:#FFF1E8;--alt:#FFFBF5;
  --pau:#4A4A6A;--pabg:#F0F0FF;
  --sof:#CC0000;--sobg:#FFEAE8;
  --lec:#0A5E44;--lbg:#E6F4F0;--llt:#F2FAF7;
  --res:#1B5E20;--rbg:#E8F5E9;
  --gold:#FFF3CD;--gok:#27AE60;--gbg:#D4EDDA;
  --red:#E74C3C;--orange:#F39C12;
  --bg:#F7F8FC;--surface:#FFFFFF;
  --border:#E2E8F2;--text:#1A2B4A;--muted:#6B7A8D;
  --radius:12px;--shadow:0 2px 12px rgba(26,43,74,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.nav{background:var(--navy);color:white;padding:14px 20px 10px;position:sticky;top:0;z-index:100;padding-top:max(14px,env(safe-area-inset-top))}
.nav-title{font-family:'DM Serif Display',serif;font-size:18px}
.nav-sub{font-size:11px;opacity:.7;margin-top:2px;font-family:'JetBrains Mono',monospace}
.nav-tabs{display:flex;gap:4px;margin-top:10px}
.nav-tab{flex:1;padding:7px 2px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .2s}
.nav-tab.active{background:rgba(255,255,255,.2);color:white}
.main{flex:1;padding:14px;overflow-y:auto;padding-bottom:84px}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-header{padding:12px 16px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.card-header h3{font-size:13px;font-weight:600}
.card-body{padding:12px 16px}
.sec-hdr{padding:9px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.9}
.date-bar{background:var(--navy);color:white;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.date-main{font-family:'DM Serif Display',serif;font-size:22px}
.date-sub{font-size:12px;opacity:.7;margin-top:2px}
.date-nav{display:flex;gap:8px;align-items:center}
.date-nav button{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.score-display{background:linear-gradient(135deg,var(--navy) 0%,#2D5FA6 100%);color:white;border-radius:var(--radius);padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.score-num{font-family:'DM Serif Display',serif;font-size:52px;line-height:1}
.score-max{font-size:18px;opacity:.6;align-self:flex-end;margin-bottom:8px}
.score-emo{font-size:44px}
.score-bar-wrap{margin-top:10px;background:rgba(255,255,255,.2);border-radius:4px;height:6px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;background:#4ade80;transition:width .5s ease}
.score-breakdown{font-size:10px;opacity:.8;margin-top:5px;font-family:'JetBrains Mono',monospace}
.input-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px;min-height:44px}
.input-row:last-child{border-bottom:none}
.input-label{flex:1;font-size:13px}
.input-label small{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.inp{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;text-align:center;background:#F8F9FD;transition:border .2s;min-width:0}
.inp:focus{outline:none;border-color:var(--blue);background:white}
.inp-select{padding:7px 6px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;background:#F8F9FD;cursor:pointer;max-width:120px}
.inp-select:focus{outline:none;border-color:var(--blue)}
.inp-num{width:70px}
textarea.inp{width:100%;height:58px;resize:none;text-align:left;font-size:12px;padding:8px}
.chk-btn{width:38px;height:38px;border-radius:10px;border:2px solid var(--border);background:white;cursor:pointer;font-size:19px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk-btn.on{background:var(--gbg);border-color:var(--gok)}
.chk-pau.on{background:var(--pabg);border-color:var(--pau)}
.chk-sof.on{background:var(--sobg);border-color:var(--sof)}
.chk-spi.on{background:var(--sbg);border-color:var(--spir)}
.counter{display:flex;align-items:center;gap:4px;flex-shrink:0}
.counter button{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.counter button:active{background:var(--pale)}
.counter-val{width:28px;text-align:center;font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}
.stars{display:flex;gap:4px;flex-shrink:0}
.star{font-size:22px;cursor:pointer;opacity:.25;transition:opacity .1s,transform .1s;user-select:none}
.star.on{opacity:1}
.star:active{transform:scale(1.2)}
.lect-slot{background:var(--mlt);border-radius:10px;padding:10px;margin-bottom:8px}
.lect-slot-title{font-size:11px;font-weight:600;color:var(--ment);margin-bottom:8px}
.lect-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lect-full{grid-column:1/-1}
.prog-bar{background:var(--border);border-radius:3px;height:3px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;transition:transform .1s;position:relative;user-select:none}
.day-cell:active{transform:scale(.9)}
.day-cell.empty{background:transparent;cursor:default;pointer-events:none}
.curve-display{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;padding:10px 12px;border-radius:8px;background:var(--pale);overflow-x:auto;white-space:nowrap;line-height:1.8}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.chart-label{font-size:11px;color:var(--muted);width:64px;text-align:right;flex-shrink:0}
.chart-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:20px;overflow:hidden}
.chart-bar-inner{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:white;transition:width .4s ease;min-width:2px}
.chart-val{font-size:11px;width:40px;font-family:'JetBrains Mono',monospace;color:var(--muted);flex-shrink:0}
.obj-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;min-height:48px}
.obj-row:last-child{border-bottom:none}
.obj-label{flex:1;font-size:13px}
.obj-type-badge{font-size:10px;padding:3px 7px;border-radius:5px;font-weight:600;flex-shrink:0}
.obj-inp{width:68px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;text-align:center;font-family:'JetBrains Mono',monospace;background:#F8F9FD}
.obj-inp:focus{outline:none;border-color:var(--blue)}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-h{background:#C5E3FF;color:#1A3A6B}
.tag-j{background:var(--gold);color:#7A5000}
.btn{padding:10px 20px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--navy);color:white}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.text-muted{color:var(--muted);font-size:12px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.stat-box{background:white;border-radius:10px;padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-emo{font-size:22px}
.stat-val{font-size:20px;font-weight:700;font-family:'DM Serif Display',serif}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(26,43,74,.08)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:4px;color:var(--muted);font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500}
.bnav-btn.active{color:var(--blue)}
.bnav-icon{font-size:22px}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:white;padding:10px 22px;border-radius:20px;font-size:13px;transition:transform .3s;z-index:200;white-space:nowrap;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.empty-state{text-align:center;padding:32px 20px;color:var(--muted)}
.empty-emo{font-size:44px;margin-bottom:10px}
</style>
</head>
<body>
<div class="app" id="app">
  <nav class="nav">
    <div class="flex-between">
      <div>
        <div class="nav-title">Mon Programme 2026</div>
        <div class="nav-sub" id="nav-date">Chargement…</div>
      </div>
      <div style="font-size:26px" id="nav-emo">—</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('today')">📝 Jour</button>
      <button class="nav-tab" onclick="showTab('month')">📅 Mois</button>
      <button class="nav-tab" onclick="showTab('stats')">📊 Stats</button>
      <button class="nav-tab" onclick="showTab('obj')">🎯 Objectifs</button>
    </div>
  </nav>
  <main class="main" id="main"></main>
  <nav class="bottom-nav">
    <button class="bnav-btn active" onclick="showTab('today')" id="bn-today"><span class="bnav-icon">📝</span>Jour</button>
    <button class="bnav-btn" onclick="showTab('month')" id="bn-month"><span class="bnav-icon">📅</span>Mois</button>
    <button class="bnav-btn" onclick="showTab('stats')" id="bn-stats"><span class="bnav-icon">📊</span>Stats</button>
    <button class="bnav-btn" onclick="showTab('obj')" id="bn-obj"><span class="bnav-icon">🎯</span>Objectifs</button>
  </nav>
  <div class="toast" id="toast"></div>
</div>
<script>
// ─── STORAGE ────────────────────────────────────────────────
const SK='prog_vie_2026';
const get=()=>{try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}};
const save=d=>localStorage.setItem(SK,JSON.stringify(d));
const dk=d=>d.toISOString().split('T')[0];
const getDay=k=>{const s=get();return s[k]||{}};
const setField=(k,f,v)=>{const s=get();if(!s[k])s[k]={};s[k][f]=v;save(s)};
const getObjs=()=>get().__objectives||defaultObjs();
const saveObjs=o=>{const s=get();s.__objectives=o;save(s)};

function defaultObjs(){return{
  pompes:{val:140,type:'H',label:'💪 Pompes',unit:'total/sem'},
  tractions:{val:70,type:'H',label:'💪 Tractions',unit:'total/sem'},
  abdos:{val:70,type:'H',label:'💪 Abdos',unit:'total/sem'},
  dips:{val:70,type:'H',label:'💪 Dips',unit:'total/sem'},
  workout:{val:60,type:'H',label:'💪 Workout (min)',unit:'min/sem'},
  course:{val:20,type:'H',label:'🏃 Course',unit:'km/sem'},
  natation:{val:1000,type:'H',label:'🏊 Natation',unit:'m/sem'},
  chapelet:{val:5,type:'J',label:'📿 Chapelet',unit:'diz/jour'},
  meditation:{val:10,type:'J',label:'🧘 Méditation',unit:'min/jour'},
  telephone:{val:2,type:'J',label:'📱 Téléphone MAX',unit:'h/jour'},
  lever:{val:7,type:'J',label:'⏰ Lever cible',unit:'h cible'},
  langue:{val:10,type:'J',label:'🗣️ Langue',unit:'min/jour'},
  geo:{val:10,type:'J',label:'🌍 Géo',unit:'min/jour'},
  creation:{val:20,type:'J',label:'✍️ Création',unit:'min/jour'},
  lecture:{val:30,type:'J',label:'🧠 Lecture total',unit:'pages+min/j'},
}}

// ─── SCORE ─────────────────────────────────────────────────
function calcScore(day,objs){
  if(day.pause)return null;
  const hasData=(day.pmt||day.psr||day.ema||day.emp||
    (parseFloat(day.pompes)>0)||(parseFloat(day.course)>0)||day.ba||
    (parseFloat(day.chapelet)>0));
  if(!hasData)return null;
  const n=v=>parseFloat(v)||0;
  const isSun=cur.getDay()===0;
  let s=0,bd={};

  // SPIRITUEL max 3.0
  const spi=(day.pmt?1:0)+(day.psr?1:0)+
    Math.min(n(day.chapelet)/5,1)*0.5+
    (objs.meditation.val>0?Math.min(n(day.meditation)/objs.meditation.val,1)*0.5:0);
  bd.spi=round1(spi);s+=spi;

  // FORCE max 1.5 — workout = force, no double
  const fs=n(day.pompes)+n(day.tractions)+n(day.abdos)+n(day.dips)+n(day.workout);
  let frc=0;
  if(day.sportoff){frc=1.5;}
  else if(isSun){frc=fs>0?Math.min(fs/(objs.pompes.val/7||1),1)*1.5:1.5;}
  else if(objs.pompes.val>0){frc=Math.min(fs/(objs.pompes.val/7),1)*1.5;}
  else if(fs>0){frc=1.0;}
  bd.frc=round1(frc);s+=frc;

  // CARDIO max 1.0
  let crd=0;
  if(day.sportoff){crd=1;}
  else if(isSun){crd=n(day.course)>0?Math.min(n(day.course)/(objs.course.val/7||1),1):1;}
  else if(n(day.course)>0&&objs.course.val>0){crd=Math.min(n(day.course)/(objs.course.val/7),1);}
  else if(n(day.course)>0){crd=0.7;}
  bd.crd=round1(crd);s+=crd;

  // ÉMOTIONNEL max 2.0 — granular, vide=0
  const ep=v=>{if(!v||v==='0')return 0;const x=parseInt(v);
    return x<=1?1:x<=2?.75:x<=3?.5:x<=4?.25:0};
  const emot=ep(day.ema)+ep(day.emp);
  bd.emot=round1(emot);s+=emot;

  // AUTRE max 2.0 — tel + lever
  const T=n(day.telephone),To=objs.telephone.val;
  const L=n(day.lever),Lo=objs.lever.val;
  const tp=day.telephone&&To>0?(T<=To?1:T<=To*1.25?.5:0):0;
  const lp=day.lever&&Lo>0?(L<=Lo?1:L<=Lo+.5?.5:0):0;
  bd.aut=round1(tp+lp);s+=tp+lp;

  // LECTURE max 0.5
  const lq=n(day.l1q)+n(day.l2q)+n(day.l3q);
  const lect=objs.lecture.val>0?Math.min(lq/objs.lecture.val,1)*.5:(lq>0?.3:0);
  bd.lect=round1(lect);s+=lect;

  // BONUS
  const ba=day.ba?.5:0;
  const cre=objs.creation.val>0?Math.min(n(day.creation)/objs.creation.val,1)*.5:0;
  const asb=Math.min(n(day.asb),2);
  bd.bonus=round1(ba+cre+asb);s+=ba+cre+asb;

  return{score:round1(s),bd};
}

const round1=v=>Math.round(v*10)/10;
const sEmo=s=>s===null?'—':s>=8?'🔥':s>=6?'✅':s>=4?'🟡':'🔴';
const sCol=s=>s===null?'#E8ECF0':s>=8?'#27AE60':s>=6?'#2D9CDB':s>=4?'#F39C12':'#E74C3C';
const sCurve=s=>s===null?'·':s>=9?'█':s>=7.5?'▇':s>=6?'▅':s>=4?'▃':'▁';

// ─── STATE ──────────────────────────────────────────────────
let cur=new Date(),tab='today';
const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MSH=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const DFR=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

// ─── TOAST ──────────────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ─── TABS ────────────────────────────────────────────────────
function showTab(t){
  tab=t;
  ['today','month','stats','obj'].forEach(x=>{
    document.getElementById('bn-'+x)?.classList.toggle('active',x===t);
  });
  document.querySelectorAll('.nav-tab').forEach((el,i)=>
    el.classList.toggle('active',['today','month','stats','obj'][i]===t));
  render();
}

// ─── RENDER ─────────────────────────────────────────────────
function render(){
  const dayKey=dk(cur),day=getDay(dayKey),objs=getObjs();
  const res=calcScore(day,objs);
  const score=res?res.score:null;
  // Nav update
  document.getElementById('nav-date').textContent=`${DFR[cur.getDay()]} ${cur.getDate()} ${MSH[cur.getMonth()]} ${cur.getFullYear()}`;
  document.getElementById('nav-emo').textContent=sEmo(score);
  if(tab==='today')document.getElementById('main').innerHTML=renderToday(day,objs,res,dayKey);
  else if(tab==='month')document.getElementById('main').innerHTML=renderMonth(objs);
  else if(tab==='stats')document.getElementById('main').innerHTML=renderStats(objs);
  else document.getElementById('main').innerHTML=renderObj(objs);
  bind(day,dayKey,objs);
}

// ─── TODAY ──────────────────────────────────────────────────
function renderToday(day,objs,res,dayKey){
  const score=res?res.score:null,bd=res?res.bd:{};
  const isToday=dk(new Date())===dayKey;
  const pct=score?Math.min(score/10*100,100):0;
  const scoreStr=score!==null?score.toFixed(1):(day.pause?'💤':'—');

  let h=`<div class="date-bar">
    <div><div class="date-main">${DFR[cur.getDay()]} ${cur.getDate()}</div>
    <div class="date-sub">${isToday?"Aujourd'hui — "+MSH[cur.getMonth()]:MFR[cur.getMonth()]+' '+cur.getFullYear()}</div></div>
    <div class="date-nav">
      <button onclick="chDay(-1)">‹</button>
      ${!isToday?'<button onclick="goToday()">●</button>':''}
      <button onclick="chDay(1)">›</button>
    </div></div>`;

  h+=`<div class="score-display">
    <div style="flex:1">
      <div style="font-size:10px;opacity:.7;font-family:'JetBrains Mono',monospace;margin-bottom:4px">SCORE DU JOUR</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="score-num">${scoreStr}</span>
        ${score!==null?'<span class="score-max">/10</span>':''}
      </div>
      ${res?`<div class="score-breakdown">🕊️${bd.spi} · 💪${bd.frc} · 🏃${bd.crd} · ❤️${bd.emot} · 🔧${bd.aut} · 📖${bd.lect}${bd.bonus>0?` · ⭐${bd.bonus}`:''}</div>`:''}
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="score-emo">${sEmo(score)}</div>
  </div>`;

  // CONTRÔLES
  h+=`<div class="card"><div class="card-body">
    <div class="input-row">
      <div class="input-label">💤 <b>PAUSE</b><small>Désactive la journée</small></div>
      <button class="chk-btn chk-pau${day.pause?' on':''}" data-f="pause">${day.pause?'✓':'•'}</button>
    </div>
    <div class="input-row">
      <div class="input-label">🚫 <b>Sport désactivé</b><small>Journée de travail physique</small></div>
      <button class="chk-btn chk-sof${day.sportoff?' on':''}" data-f="sportoff">${day.sportoff?'✓':'•'}</button>
    </div>
  </div></div>`;

  if(day.pause)return h+`<div class="card"><div class="card-body empty-state"><div class="empty-emo">💤</div><div>Journée de pause</div><div class="text-muted" style="margin-top:6px">Repos bien mérité.</div></div></div>`;

  // FORCE
  const fw=f=>getWeekSum(f,cur);
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--pbg);color:var(--phys)">💪 FORCE</div>
  <div class="card-body">`;
  [['pompes','Pompes'],['tractions','Tractions'],['abdos','Abdos'],['dips','Dips']].forEach(([f,l])=>{
    const w=fw(f),o=objs[f].val,p=o>0?Math.min(w/o*100,100):0;

      <div class="input-label">${l}<small>Sem: ${w} / ${o||'—'} ${objs[f].unit}

  // CARDIO
  const cw=getWeekSum('course',cur).toFixed(1);
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--cbg);color:var(--card)">🏃 CARDIO</div>
  <div class="card-body">
    <div class="input-row">

    <div class="input-row">
      <div class="input-label">Natation (m)</div>
      <input type="number" min="0" class="inp inp-num" data-f="natation" value="${day.natation||''}" placeholder="0">
    </div>
  </div></div>`;

  // AUTRE SPORT
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--clt);color:var(--card)">🏅 AUTRE SPORT</div>
  <div class="card-body">
    <div class="input-row">
      <div class="input-label">Description<small>marche, vélo, foot…</small></div>

    </div>
    <div class="input-row">
      <div class="input-label">Quantité (km ou min)</div>
      <input type="number" min="0" step="0.1" class="inp inp-num" data-f="asq" value="${day.asq||''}" placeholder="0">
    </div>
    <div class="input-row">
      <div class="input-label">Bonus pts (0-2, toi qui choisis)</div>
      <input type="number" min="0" max="2" step="0.5" class="inp inp-num" data-f="asb" value="${day.asb||''}" placeholder="0">
    </div>
  </div></div>`;

  // SPIRITUEL
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--sbg);color:var(--spir)">🕊️ SPIRITUEL</div>
  <div class="card-body">
    <div class="input-row">
      <div class="input-label">🙏 Prière matin</div>
      <button class="chk-btn chk-spi${day.pmt?' on':''}" data-f="pmt">🙏</button>
    </div>
    <div class="input-row">
      <div class="input-label">🙏 Prière soir</div>
      <button class="chk-btn chk-spi${day.psr?' on':''}" data-f="psr">🙏</button>
    </div>
    <div class="input-row">
      <div class="input-label">📿 Chapelet<small>${day.chapelet||0} / ${objs.chapelet.val} dizaines</small></div>
      <div class="stars">${[1,2,3,4,5].map(i=>`<span class="star${(parseInt(day.chapelet)||0)>=i?' on':''}" data-f="chapelet" data-v="${i}">📿</span>`).join('')}</div>
    </div>
    <div class="input-row">
      <div class="input-label">🧘 Méditation (min)</div>
      <input type="number" min="0" class="inp inp-num" data-f="meditation" value="${day.meditation||''}" placeholder="0">
    </div>
  </div></div>`;

  // ÉMOTIONNEL
  const emCol=(v)=>v?['','#27AE60','#85C68E','#F39C12','#E86E3A','#E74C3C'][Math.min(parseInt(v)||0,5)]:'inherit';
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--ebg);color:var(--emot)">❤️ ÉMOTIONNEL</div>
  <div class="card-body">
    <div class="input-row">
      <div class="input-label">Emm. A<small style="color:${emCol(day.ema)}">${day.ema?day.ema+'/5 — '+(['','très bien','bien','moyen','difficile','très dur'][parseInt(day.ema)||0]):'non renseigné'}</small></div>
      <div class="counter">
        <button onclick="adj('ema',-1)">−</button>
        <span class="counter-val">${day.ema||0}</span>
        <button onclick="adj('ema',1)">+</button>
      </div>
    </div>
    <div class="input-row">
      <div class="input-label">Emm. P<small style="color:${emCol(day.emp)}">${day.emp?day.emp+'/5':'non renseigné'}</small></div>
      <div class="counter">
        <button onclick="adj('emp',-1)">−</button>
        <span class="counter-val">${day.emp||0}</span>
        <button onclick="adj('emp',1)">+</button>
      </div>
    </div>
  </div></div>`;

  // AUTRE
  const telOpts=[0,.25,.5,.75,1,1.25,1.5,1.75,2,2.25,2.5,2.75,3,3.25,3.5,3.75,4,4.5,5,5.5,6,6.5,7,7.5,8];
  const levOpts=[4,4.25,4.5,4.75,5,5.25,5.5,5.75,6,6.25,6.5,6.75,7,7.25,7.5,7.75,8,8.25,8.5,8.75,9];
  const fmt=(v)=>{if(!v&&v!==0)return'—';const h=Math.floor(v),m=Math.round((v-h)*60);return h+'h'+(m?String(m).padStart(2,'0'):'00')};
  const telOver=day.telephone&&objs.telephone.val&&parseFloat(day.telephone)>objs.telephone.val;
  const levOver=day.lever&&objs.lever.val&&parseFloat(day.lever)>objs.lever.val;
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--abg);color:var(--aut)">🔧 AUTRE</div>
  <div class="card-body">
    <div class="input-row">
      <div class="input-label">📱 Téléphone<small>MAX: ${fmt(objs.telephone.val)}/jour</small></div>
      <select class="inp-select" data-f="telephone" style="${telOver?'border-color:var(--red);background:#FFF0F0':''}">
        <option value="">—</option>
        ${telOpts.map(v=>`<option value="${v}"${parseFloat(day.telephone)===v?' selected':''}>${fmt(v)}</option>`).join('')}
      </select>
    </div>
    <div class="input-row">
      <div class="input-label">⏰ Lever<small>Cible: ${fmt(objs.lever.val)}</small></div>
      <select class="inp-select" data-f="lever" style="${levOver?'border-color:var(--red);background:#FFF0F0':''}">
        <option value="">—</option>
        ${levOpts.map(v=>`<option value="${v}"${parseFloat(day.lever)===v?' selected':''}>${fmt(v)}</option>`).join('')}
      </select>
    </div>
    <div class="input-row">
      <div class="input-label">🗣️ Langue (min)</div>
      <input type="number" min="0" class="inp inp-num" data-f="langue" value="${day.langue||''}" placeholder="0">
    </div>
    <div class="input-row">
      <div class="input-label">🌍 Géo (min)</div>
      <input type="number" min="0" class="inp inp-num" data-f="geo" value="${day.geo||''}" placeholder="0">
    </div>
  </div></div>`;

  // LECTURES
  const typeOpts=['Livre','Documentaire','Podcast','Article','Série'];
  const themeOpts=['Géopolitique','Économie','Histoire','Philosophie','Religion','Science','Société','Agriculture','Littérature','Dvpt perso','Divertissement'];
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--mbg);color:var(--ment)">🧠 LECTURES · PODCASTS</div>
  <div class="card-body">
    ${[1,2,3].map(i=>{
      const t=day[`l${i}t`]||'',m=day[`l${i}m`]||'',q=day[`l${i}q`]||'';
      return`<div class="lect-slot">
        <div class="lect-slot-title">Slot ${i} ${t?'— '+t:''} ${m?'· '+m:''}</div>
        <div class="lect-grid">
          <select class="inp-select lect-full" data-f="l${i}t">
            <option value="">Type…</option>
            ${typeOpts.map(x=>`<option${t===x?' selected':''}>${x}</option>`).join('')}
          </select>
          <select class="inp-select" data-f="l${i}m">
            <option value="">Thème…</option>
            ${themeOpts.map(x=>`<option${m===x?' selected':''}>${x}</option>`).join('')}
          </select>
          <input type="number" min="0" class="inp" style="width:100%" data-f="l${i}q" value="${q}" placeholder="${t==='Livre'?'pages':'min'}">
        </div>
      </div>`;
    }).join('')}
  </div></div>`;

  // RESTE
  h+=`<div class="card">
  <div class="sec-hdr" style="background:var(--rbg);color:var(--res)">🌱 RESTE (bonus)</div>
  <div class="card-body">
    <div class="input-row">
      <div class="input-label">🤲 BA / Service</div>
      <button class="chk-btn${day.ba?' on':''}" data-f="ba" style="${day.ba?'background:var(--rbg);border-color:var(--res)':''}">🤲</button>
    </div>
    <div class="input-row">
      <div class="input-label">✍️ Création (min)</div>
      <input type="number" min="0" class="inp inp-num" data-f="creation" value="${day.creation||''}" placeholder="0">
    </div>
    <div class="input-row"><div class="input-label">💬 Commentaire</div></div>
    <textarea class="inp" data-f="commentaire" placeholder="Notes du jour…">${day.commentaire||''}</textarea>
  </div></div>`;

  return h;
}

// ─── MONTH ──────────────────────────────────────────────────
function renderMonth(objs){
  const y=cur.getFullYear(),m=cur.getMonth();
  const dim=new Date(y,m+1,0).getDate();
  const first=(new Date(y,m,1).getDay()+6)%7;
  const todayKey=dk(new Date());

  let h=`<div class="flex-between" style="margin-bottom:12px;padding:0 4px">
    <button class="btn btn-ghost" style="padding:6px 14px" onclick="chMon(-1)">‹</button>
    <div style="font-family:'DM Serif Display',serif;font-size:20px">${MFR[m]} ${y}</div>
    <button class="btn btn-ghost" style="padding:6px 14px" onclick="chMon(1)">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0">${d}</div>`).join('')}
  </div>
  <div class="month-grid" style="margin-bottom:14px">
    ${Array(first).fill('<div class="day-cell empty"></div>').join('')}
    ${Array.from({length:dim},(_,i)=>{
      const d=i+1;
      const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const day=getDay(key),res=calcScore(day,objs),s=res?res.score:null;
      const isCur=key===dk(cur),isT=key===todayKey;
      const bg=day.pause?'var(--pabg)':s?sCol(s):'var(--border)';
      const fc=s?'white':'var(--muted)';
      return`<div class="day-cell" style="background:${bg};color:${fc};${isCur?'box-shadow:0 0 0 2px var(--navy)':''};${isT?'box-shadow:0 0 0 2px #F39C12':''}"
        onclick="goDay(${y},${m},${d})">
        ${day.pause?'💤':d}
        ${s?`<span style="position:absolute;bottom:1px;right:2px;font-size:8px;opacity:.9">${s.toFixed(0)}</span>`:''}
      </div>`;
    }).join('')}
  </div>`;

  // Curve
  const curve=Array.from({length:dim},(_,i)=>{
    const d=i+1,key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const res=calcScore(getDay(key),objs);return res?res.score:null;
  });
  h+=`<div class="card"><div class="card-header"><h3>📈 Courbe du mois</h3></div><div class="card-body">
    <div class="curve-display">${curve.map((s,i)=>`<span title="J${i+1}:${s||'—'}" style="color:${sCol(s)}">${sCurve(s)}</span>`).join('')}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace">▁=0-4 · ▃=4-6 · ▅=6-7.5 · ▇=7.5-9 · █=9+</div>
  </div></div>`;

  // Stats rapides
  const scores=curve.filter(s=>s!==null);
  const avg=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  h+=`<div class="stat-grid">
    ${[['Moyenne',avg.toFixed(1),'📊','var(--navy)'],
       ['Meilleure',(scores.length?Math.max(...scores):0).toFixed(1),'🏆','var(--gok)'],
       ['Jours 🔥',scores.filter(s=>s>=8).length+'','🔥','#E74C3C']].map(([l,v,e,c])=>
    `<div class="stat-box"><div class="stat-emo">${e}</div>
     <div class="stat-val" style="color:${c}">${v}</div>
     <div class="stat-lbl">${l}</div></div>`).join('')}
  </div>`;
  return h;
}

// ─── STATS ──────────────────────────────────────────────────
function renderStats(objs){
  const y=cur.getFullYear(),m=cur.getMonth();
  const dim=new Date(y,m+1,0).getDate();
  const nw=dim/7;
  let T={pompes:0,tractions:0,abdos:0,dips:0,workout:0,course:0,natation:0,
    pmt:0,psr:0,chapelet:0,meditation:0,langue:0,geo:0,creation:0,lect:0,ba:0,
    tel:[],lev:[],emA:[],emP:[]};
  for(let d=1;d<=dim;d++){
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day=getDay(key);if(day.pause)continue;
    ['pompes','tractions','abdos','dips','workout','course','natation','langue','geo','creation'].forEach(f=>T[f]+=(parseFloat(day[f])||0));
    if(day.pmt)T.pmt++;if(day.psr)T.psr++;
    T.chapelet+=(parseInt(day.chapelet)||0);T.meditation+=(parseFloat(day.meditation)||0);
    T.lect+=(parseFloat(day.l1q)||0)+(parseFloat(day.l2q)||0)+(parseFloat(day.l3q)||0);
    if(day.ba)T.ba++;
    if(day.telephone)T.tel.push(parseFloat(day.telephone));
    if(day.lever)T.lev.push(parseFloat(day.lever));
    if(day.ema)T.emA.push(parseInt(day.ema));if(day.emp)T.emP.push(parseInt(day.emp));
  }
  const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):'—';
  const bar=(v,m2,c)=>{const p=m2>0?Math.min(v/m2*100,100):0;
    return`<div class="chart-bar-wrap"><div class="chart-bar-inner" style="width:${p}%;background:${c}">${p>10?Math.round(p)+'%':''}</div></div>`};
  const fmt=v=>{if(!v&&v!==0)return'—';const hh=Math.floor(v),mm=Math.round((v-hh)*60);return hh+'h'+(mm?String(mm).padStart(2,'0'):'00')};

  let h=`<div class="card"><div class="card-header"><h3>📊 Bilan ${MSH[m]} ${y}</h3></div><div class="card-body chart-container" style="padding:12px 16px">`;
  h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;margin-top:4px">💪 FORCE</div>`;
  [['Pompes',T.pompes,objs.pompes.val*nw,'var(--phys)'],['Tract.',T.tractions,objs.tractions.val*nw,'var(--phys)'],
   ['Abdos',T.abdos,objs.abdos.val*nw,'var(--phys)'],['Dips',T.dips,objs.dips.val*nw,'var(--phys)'],
   ['Workout',T.workout+'min',objs.workout.val*nw,'var(--phys)']].forEach(([l,v,mx,c])=>
    h+=`<div class="chart-row"><span class="chart-label">${l}</span>${bar(parseFloat(v),mx,c)}<span class="chart-val">${v}</span></div>`);
  h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 8px">🏃 CARDIO</div>`;
  [[`Course`,T.course.toFixed(1)+'km',objs.course.val*nw,'var(--card)'],[`Natation`,T.natation+'m',objs.natation.val*nw,'var(--card)']].forEach(([l,v,mx,c])=>
    h+=`<div class="chart-row"><span class="chart-label">${l}</span>${bar(parseFloat(v),mx,c)}<span class="chart-val">${v}</span></div>`);
  h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 8px">🕊️ SPIRITUEL</div>`;
  [['Prière M',T.pmt+'j',dim,'var(--spir)'],['Prière S',T.psr+'j',dim,'var(--spir)'],
   ['Chapelet',T.chapelet,objs.chapelet.val*dim,'#C8A000'],['Médit.',T.meditation.toFixed(0)+'min',objs.meditation.val*dim,'#9C27B0']].forEach(([l,v,mx,c])=>
    h+=`<div class="chart-row"><span class="chart-label">${l}</span>${bar(parseFloat(v),mx,c)}<span class="chart-val">${v}</span></div>`);
  h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 8px">🔧 AUTRE</div>`;
  h+=`<div class="chart-row"><span class="chart-label">📱 Tél. moy</span><span style="flex:1;font-size:12px;font-family:'JetBrains Mono',monospace">${fmt(parseFloat(avg(T.tel)))} / jour <span style="color:var(--muted)">(max ${fmt(objs.telephone.val)})</span></span></div>`;
  h+=`<div class="chart-row"><span class="chart-label">⏰ Lever moy</span><span style="flex:1;font-size:12px;font-family:'JetBrains Mono',monospace">${fmt(parseFloat(avg(T.lev)))} <span style="color:var(--muted)">(cible ${fmt(objs.lever.val)})</span></span></div>`;
  [['Langue',T.langue+'min',objs.langue.val*dim,'var(--aut)'],['Géo',T.geo+'min',objs.geo.val*dim,'var(--aut)'],
   ['Création',T.creation+'min',objs.creation.val*dim,'var(--ment)'],['Lecture',T.lect,objs.lecture.val*dim,'var(--lec)'],
   ['BA ✓',T.ba+'j',dim,'var(--res)']].forEach(([l,v,mx,c])=>
    h+=`<div class="chart-row"><span class="chart-label">${l}</span>${bar(parseFloat(v),mx,c)}<span class="chart-val">${v}</span></div>`);
  h+=`</div></div>`;

  h+=`<div class="card"><div class="card-header"><h3>❤️ Emmerdements — moy. du mois</h3></div>
  <div class="card-body">
    <div class="input-row"><span style="font-size:13px">Emm. A</span><span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600">${avg(T.emA)}/5</span></div>
    <div class="input-row"><span style="font-size:13px">Emm. P</span><span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600">${avg(T.emP)}/5</span></div>
  </div></div>`;

  h+=`<div class="card"><div class="card-header"><h3>💾 Sauvegarder mes données</h3></div>
  <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
    <button class="btn btn-primary" onclick="exportData()" style="width:100%">📥 Exporter (JSON)</button>
    <label class="btn btn-ghost" style="width:100%;text-align:center;cursor:pointer;padding:10px 20px">
      📤 Importer des données
      <input type="file" accept=".json" onchange="importData(event)" style="display:none">
    </label>
    <div class="text-muted" style="text-align:center;padding:4px 0">Pour sauvegarder: exporte le fichier JSON et garde-le dans Google Drive. Pour restaurer: importe-le ici.</div>
  </div></div>`;
  return h;
}

// ─── OBJECTIVES ─────────────────────────────────────────────
function renderObj(objs){
  const groups=[
    {title:'💪 Force',col:'var(--phys)',bg:'var(--pbg)',keys:['pompes','tractions','abdos','dips','workout']},
    {title:'🏃 Cardio',col:'var(--card)',bg:'var(--cbg)',keys:['course','natation']},
    {title:'🕊️ Spirituel',col:'var(--spir)',bg:'var(--sbg)',keys:['chapelet','meditation']},
    {title:'🔧 Autre',col:'var(--aut)',bg:'var(--abg)',keys:['telephone','lever','langue','geo']},
    {title:'🌱 Reste',col:'var(--res)',bg:'var(--rbg)',keys:['creation','lecture']},
  ];
  let h=`<div style="font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 4px">Modifie tes objectifs. <span class="badge tag-h">🗓️ Hebdo</span> = par semaine · <span class="badge tag-j">📅 Quotidien</span> = par jour.</div>`;
  groups.forEach(g=>{
    h+=`<div class="card"><div class="sec-hdr" style="background:${g.bg};color:${g.col}">${g.title}</div><div class="card-body">`;
    g.keys.forEach(k=>{
      const o=objs[k];if(!o)return;
      h+=`<div class="obj-row">
        <div class="obj-label">${o.label}<br><span class="text-muted">${o.unit}</span></div>
        <span class="obj-type-badge ${o.type==='H'?'tag-h':'tag-j'}">${o.type==='H'?'🗓️':'📅'}</span>
        <input type="number" min="0" step="0.5" class="obj-inp" data-k="${k}" value="${o.val}" onchange="updObj('${k}',this.value)">
      </div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

// ─── HELPERS ────────────────────────────────────────────────
function getWeekSum(f,date){
  const d=date.getDay(),mon=new Date(date);
  mon.setDate(date.getDate()-((d+6)%7));
  let t=0;
  for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);t+=parseFloat(getDay(dk(dd))[f]||0);}
  return Math.round(t*10)/10;
}
function chDay(delta){const d=new Date(cur);d.setDate(d.getDate()+delta);cur=d;render()}
function goToday(){cur=new Date();render()}
function chMon(delta){cur=new Date(cur.getFullYear(),cur.getMonth()+delta,1);render()}
function goDay(y,m,d){cur=new Date(y,m,d);showTab('today')}
function adj(f,delta){
  const k=dk(cur),day=getDay(k),cur2=parseInt(day[f])||0;
  const nv=Math.max(0,Math.min(5,cur2+delta));
  setField(k,f,nv||'');render();
}
function updObj(key,val){
  const o=getObjs();if(o[key]){o[key].val=parseFloat(val)||0;saveObjs(o);}
  toast('✓ Objectif mis à jour');
}
function exportData(){
  const blob=new Blob([JSON.stringify(get(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`mon_programme_${dk(new Date())}.json`;a.click();
  toast('📥 Export téléchargé');
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{localStorage.setItem(SK,JSON.stringify(JSON.parse(ev.target.result)));toast('✓ Données importées');render();}catch{toast('❌ Fichier invalide');}};
  r.readAsText(f);
}

// ─── BIND EVENTS ────────────────────────────────────────────
function bind(day,dayKey,objs){
  document.querySelectorAll('.chk-btn[data-f]').forEach(b=>{
    b.addEventListener('click',()=>{
      const f=b.dataset.f,cur2=getDay(dayKey)[f];
      setField(dayKey,f,!cur2);render();
    });
  });
  document.querySelectorAll('.inp[data-f],.inp-select[data-f],textarea[data-f]').forEach(inp=>{
    ['change','blur'].forEach(ev=>inp.addEventListener(ev,()=>{
      setField(dayKey,inp.dataset.f,inp.value);render();
    }));
  });
  document.querySelectorAll('.star[data-f]').forEach(s=>{
    s.addEventListener('click',()=>{
      const f=s.dataset.f,cur2=parseInt(getDay(dayKey)[f])||0,nv=parseInt(s.dataset.v);
      setField(dayKey,f,cur2===nv?0:nv);render();
    });
  });
}

render();
</script>
